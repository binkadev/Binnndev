name: Update Custom Streak

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate custom streak SVG
        env:
          STREAK_START_DATE: "2025-10-12"
          TIME_ZONE: "Asia/Ho_Chi_Minh"
        run: node scripts/generate-streak.js

      - name: Commit updated streak SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/custom-streak.svg
          git diff --cached --quiet || git commit -m "Update custom streak"
          git push
